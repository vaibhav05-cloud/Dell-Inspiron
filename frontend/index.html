<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dell GraphRAG Assistant</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">DG</span>
        <span class="brand-name">Dell GraphRAG Assistant</span>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="query">Query</button>
        <button class="tab-btn" data-tab="upload">Upload</button>
      </nav>
    </header>

    <main class="app-main">

      <!-- ===================== QUERY TAB ===================== -->
      <section id="query-tab" class="tab-panel active">

        <div id="chat-window" class="chat-window">
          <div class="chat-empty" id="chat-empty">
            <p>No conversation yet.</p>
            <p class="muted">Ask a question about the ingested manual to get started.</p>
          </div>
        </div>

        <form id="query-form" class="query-form">
          <input
            type="text"
            id="query-input"
            placeholder="Ask something about the manual…"
            autocomplete="off"
            required
          />
          <button type="submit" id="query-submit">
            <span class="btn-label">Ask</span>
            <span class="spinner" id="query-spinner" hidden></span>
          </button>
        </form>

        <div class="query-footer">
          <button id="clear-chat" type="button" class="link-btn">Clear chat history</button>
        </div>
      </section>

      <!-- ===================== UPLOAD TAB ===================== -->
      <section id="upload-tab" class="tab-panel">

        <form id="upload-form" class="upload-form">

          <label for="pdf-file" id="dropzone" class="dropzone">
            <input type="file" id="pdf-file" accept="application/pdf" hidden />
            <div class="dropzone-content" id="dropzone-content">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="dropzone-title">Drag &amp; drop a PDF here</p>
              <p class="muted">or click to browse files</p>
            </div>
          </label>

          <div id="file-chip" class="file-chip" hidden>
            <span class="file-chip-name" id="file-chip-name"></span>
            <button type="button" id="file-chip-remove" class="file-chip-remove">&times;</button>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" id="force-checkbox" />
            <span>Force re-ingestion (overwrites the existing knowledge base)</span>
          </label>

          <button type="submit" id="upload-submit" class="primary-btn">
            <span class="btn-label">Upload &amp; Ingest</span>
            <span class="spinner" id="upload-spinner" hidden></span>
          </button>
        </form>

        <div id="upload-status" class="upload-status"></div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
